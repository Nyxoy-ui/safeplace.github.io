<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="SafePlace Books ist eine lokale PWA zum Schreiben, Lesen und Beantworten interaktiver Bücher.">
  <title>SafePlace Books</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' rx='28' fill='%238b5cf6'/%3E%3Cpath d='M30 34c13-7 25-7 34 1 9-8 21-8 34-1v57c-13-6-25-6-34 2-9-8-21-8-34-2V34z' fill='white'/%3E%3Cpath d='M64 35v58' stroke='%238b5cf6' stroke-width='5'/%3E%3C/svg%3E">
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <aside id="sideMenu" class="side-menu" aria-label="Hauptmenü">
    <div class="brand small">
      <span class="brand-mark">SP</span>
      <div>
        <strong>SafePlace Books</strong>
        <small>Offline PWA</small>
      </div>
    </div>
    <nav id="mainNav" class="menu-list"></nav>
    <button id="themeToggle" class="ghost-button" type="button">🌙 Dunkles Design</button>
    <button id="logoutBtn" class="ghost-button danger" type="button">Abmelden</button>
  </aside>
  <div id="menuOverlay" class="menu-overlay"></div>

  <header class="topbar">
    <button id="menuBtn" class="icon-button" type="button" aria-label="Menü öffnen">☰</button>
    <div class="brand">
      <span class="brand-mark">SP</span>
      <div>
        <strong>SafePlace Books</strong>
        <small id="roleBadge">Nicht angemeldet</small>
      </div>
    </div>
    <button id="quickSaveBtn" class="primary-button compact" type="button">Speichern</button>
  </header>

  <main id="app" class="app-shell"></main>

  <template id="bookCardTemplate">
    <article class="book-card">
      <div class="book-cover"></div>
      <div class="book-card-body">
        <div class="book-card-topline">
          <span class="pill"></span>
          <button class="favorite-button" type="button" aria-label="Favorit umschalten">☆</button>
        </div>
        <h3></h3>
        <p></p>
        <div class="progress-wrap" aria-label="Lesefortschritt">
          <span></span>
          <div class="progress-track"><div class="progress-bar"></div></div>
        </div>
        <div class="card-actions"></div>
      </div>
    </article>
  </template>

  <script src="script.js" defer></script>
</body>
</html>
